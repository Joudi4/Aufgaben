<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Text Tool</title>
    <link rel="stylesheet" href="/CSS/Aufgabe6.css">
</head>

<body>
    <h1>Text Tool</h1>
    Text eingeben:<br>
    <textarea id="eingabe" rows="4" cols="50"></textarea>
    <br><br>
    <button onclick="textVerkuerzen()">Text verkuerzen</button>
    <button onclick="zeichenZaehlen()">Zeichen zaehlen</button>
    <button onclick="vokaleErsetzen()">Vokale ersetzen</button>
    <button onclick="textWiederholen()">Text wiederholen</button>
    <button onclick="abstaendeNormalisieren()">Abstaende normalisieren</button>
    <button onclick="kleinbuchstaben()">Kleinbuchstaben anzeigen</button>
    <button onclick="ersetzen()">Wort ersetzen</button>
    <div id="ausgabe"></div>
    <script>
        let ausgabe = document.getElementById("ausgabe");
        let eingabe = document.getElementById("eingabe");
        // Wort ersetzen
        function ersetzen() {
            let text = eingabe.value;
            let alt = prompt("Welches Wort soll ersetzt werden?");
            let neu = prompt("Womit soll es ersetzt werden?");
            ausgabe.innerHTML = "<br>Ersetzt: " + text.replace(alt, neu);
        }
        // Text verkuerzen
        function textVerkuerzen() {
            let text = eingabe.value;
            let laenge = prompt("Auf wie viele Zeichen verkuerzen?");
            let kurz = "";
            for (let i = 0; i < laenge; i++) {
                kurz = kurz + text.charAt(i);
            }
            kurz = kurz + "...";
            ausgabe.innerHTML = "<br>Verkuerzt: " + kurz;
        }
        // Zeichen zaehlen
        function zeichenZaehlen() {
            let text = eingabe.value;
            ausgabe.innerHTML = "<br>Anzahl Zeichen: " + text.length;
        }
        // Vokale ersetzen durch *
        function vokaleErsetzen() {
            let text = eingabe.value;
            let neu = "";
            for (let i = 0; i < text.length; i++) {
                let zeichen = text.charAt(i);
                if (zeichen == "a" || zeichen == "e" || zeichen == "i" || zeichen == "o" || zeichen == "u") {
                    neu = neu + "*";
                } else {
                    neu = neu + zeichen;
                }
            }
            ausgabe.innerHTML = "<br>Vokale ersetzt: " + neu;
        }
        // Text wiederholen
        function textWiederholen() {
            let text = eingabe.value;
            let anzahl = prompt("Wie oft soll der Text wiederholt werden?");
            let ergebnis = "";

            for (let i = 0; i < anzahl; i++) {
                ergebnis = ergebnis + text + " ";

            }
            ausgabe.innerHTML = "<br>Wiederholt: " + ergebnis;
        }

    </script>
</body>

</html>
